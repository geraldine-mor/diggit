{% extends "base.html" %}
{% load static %}

{% block content %}

<!--Single post-->
<div class="single-post">
    <div class="title">
        <h2>{{ post.title }}</h2>
        <div id="details" class="d-flex"><span class="author">{% if post.author.is_superuser %}Claude
                Digsby {% else %} {{ post.author }} {% endif %}</span>
            <span class="date ms-auto">{{ post.created_on | date }}</span>
        </div>
    </div>
    <div class="content">
        <p class="post-content">{{ post.content }}</p>
    </div>
</div>


{% endblock %}
